services:
  shelly-manager-admin:
    build: .
    container_name: shelly-manager-admin
    restart: unless-stopped
    volumes:
      - ${APP_DB_PATH}:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - FLASK_ENV=${FLASK_ENV}

    # --- IP-Scan Modus (Standard) ---
    # Fester Port, kein Host-Netzwerk nötig:
    ports:
      - "${HOST_PORT}:5000"

    # --- mDNS Modus ---
    # Für mDNS-Discovery braucht der Container Zugriff auf das Host-Netzwerk.
    # Dann: obige "ports"-Zeilen auskommentieren und diese zwei einkommentieren:
    # network_mode: host
    # (Port ist dann immer 5000, HOST_PORT wird ignoriert)
