<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Login - Shelly Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
    <script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); })();</script>
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh; padding: 0;">
    <div class="card p-4 shadow" style="width: 350px;">
        <h3 class="mb-4 text-center fw-bold text-white">System Login</h3>
        <form action="/login" method="post">
            <div class="mb-3">
                <label class="form-label">Benutzername</label>
                <input type="text" name="username" class="form-control" placeholder="admin" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Passwort</label>
                <input type="password" name="password" class="form-control" placeholder="Kennwort" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">ANMELDEN</button>
        </form>
    </div>
</body>
</html>
