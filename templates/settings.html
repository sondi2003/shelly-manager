<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Einstellungen - Shelly Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
        <div class="card p-4 shadow" style="width: 100%; max-width: 480px;">
            <h3 class="mb-4 text-center fw-bold">Konfiguration</h3>

            {% if message %}
            <div class="alert alert-success bg-success text-white border-0 py-2 small mb-4">{{ message }}</div>
            {% endif %}

            <form action="/settings" method="post">

                <!-- Scan-Modus Umschalter -->
                <div class="mb-4">
                    <label class="form-label">Erkennungs-Methode</label>
                    <div class="scan-mode-toggle">
                        <label class="scan-option {% if scan_mode == 'ip' %}active{% endif %}">
                            <input type="radio" name="scan_mode" value="ip" {% if scan_mode == 'ip' %}checked{% endif %} onchange="onScanModeChange(this)">
                            <span class="scan-icon">🔍</span>
                            <span class="scan-label">IP-Scan</span>
                            <span class="scan-desc">Manueller IP-Bereich</span>
                        </label>
                        <label class="scan-option {% if scan_mode == 'mdns' %}active{% endif %}">
                            <input type="radio" name="scan_mode" value="mdns" {% if scan_mode == 'mdns' %}checked{% endif %} onchange="onScanModeChange(this)">
                            <span class="scan-icon">📡</span>
                            <span class="scan-label">mDNS</span>
                            <span class="scan-desc">Automatisch im Netz</span>
                        </label>
                    </div>
                </div>

                <!-- IP-Bereich — nur bei IP-Scan sichtbar -->
                <div class="mb-4" id="ip-range-block" {% if scan_mode == 'mdns' %}style="display:none"{% endif %}>
                    <label class="form-label">Scan-Bereich / Subnetz</label>
                    <input type="text" name="ip_range" class="form-control" value="{{ ip_range }}"
                           placeholder="z.B. 192.168.1.1-192.168.1.50 oder 192.168.1.0/24">
                    <div class="form-text">Bereich mit - oder CIDR-Notation eingeben.</div>
                </div>

                <!-- mDNS Hinweis — nur bei mDNS sichtbar -->
                <div class="mb-4" id="mdns-info-block" {% if scan_mode == 'ip' %}style="display:none"{% endif %}>
                    <div class="alert-mdns">
                        <strong>📡 mDNS aktiv</strong><br>
                        Geräte werden automatisch im lokalen Netzwerk gefunden.<br>
                        <span class="text-muted small">Funktioniert nur wenn der Docker-Container im Host-Netzwerk läuft (<code>network_mode: host</code>).</span>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Zentrales Shelly Passwort</label>
                    <input type="password" name="shelly_password" class="form-control" value="{{ shelly_pwd }}"
                           placeholder="Passwort eingeben">
                </div>

                <hr class="my-4" style="border-color: var(--border);">

                <div class="mb-4">
                    <label class="form-label">Admin Passwort ändern</label>
                    <input type="password" name="admin_password" class="form-control"
                           placeholder="Nur bei Änderung ausfüllen">
                </div>

                <button type="submit" class="btn btn-primary w-100">EINSTELLUNGEN SPEICHERN</button>
                <a href="/" class="btn-back">← Zurück zum Dashboard</a>
            </form>
        </div>
    </div>

    <script>
    function onScanModeChange(el) {
        const isIP = el.value === 'ip';
        document.getElementById('ip-range-block').style.display  = isIP ? '' : 'none';
        document.getElementById('mdns-info-block').style.display = isIP ? 'none' : '';
        // Aktiv-Klasse für Styling
        document.querySelectorAll('.scan-option').forEach(opt => opt.classList.remove('active'));
        el.closest('.scan-option').classList.add('active');
    }
    </script>
</body>
</html>
